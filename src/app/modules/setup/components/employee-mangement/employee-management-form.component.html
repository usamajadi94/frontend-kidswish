<div class="grid grid-cols-12 gap-2">
    <div class="col-span-3">
        <bft-input-date name="JoinDate" label="Join Date" required="true" [skeleton]="isDataLoading"
            [(ngModel)]="formData.JoinDate" />
    </div>
    <div class="col-span-3">
        <bft-input-text name="EmployeeID" label="Employee ID" [(ngModel)]="formData.EmployeeId" [skeleton]="isDataLoading"  />
    </div>
    <div class="col-span-6">
        <bft-input-text name="Description" label="Employee Name" required="true" [(ngModel)]="formData.Description"
            [skeleton]="isDataLoading" />
    </div>
</div>

<div class="grid grid-cols-2 gap-2 mt-2">
    <div class="w-full">
        <bft-input-email name="Email" label="Email" [(ngModel)]="formData.Email" [skeleton]="isDataLoading" />
    </div>
    <div class="w-full">

               <bft-input-phone name="PhoneNo" label="Phone No" [(ngModel)]="formData.PhoneNo" [skeleton]="isDataLoading"
            mask="(000)000-0000" flagImg="https://cdn.kcak11.com/CountryFlags/countries/pk.svg" />
    </div>
</div>

<div class="grid grid-cols-2 gap-2 mt-2">

</div>

<div class="grid grid-cols-2 gap-2 mt-2">
    <div class="w-full">
        <bft-checkbox name="IsActive" label="Active" [(ngModel)]="formData.IsActive" [skeleton]="isDataLoading" />
    </div>
</div>
