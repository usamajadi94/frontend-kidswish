<div class="grid grid-cols-12 gap-2">
    <div class="col-span-4">
        <bft-input-date name="OrderDate" label="Order Date" [(ngModel)]="formData.OrderDate" [skeleton]="isDataLoading" />
    </div>
    <div class="col-span-4">
        <bft-select name="Supplier" label="Supplier" [displayList]="suppliers" valueField="ID"
            displayField="Description" [(ngModel)]="formData.SupplierID" [skeleton]="isDataLoading" />
    </div>
    <div class="col-span-4">
      <bft-textarea name="Description" label="Description" [(ngModel)]="formData.Description" [skeleton]="isDataLoading"  />

    </div>
</div>


<nz-collapse nzBordered="false" class="main-collapse mt-4 bg-white">
    @for (pack of groupedPacks; track pack.name) {
    <nz-collapse-panel [nzHeader]="packHeader" [nzActive]="false" class="rounded-xl shadow-sm bg-white mb-3 p-2 py-1">
        <ng-template #packHeader>
            <div class="flex justify-between items-center w-full">
                <span class="font-semibold">{{ pack.name }}</span>
                <span class="border px-4 py-1 rounded-full text-sm text-gray-600">
                    {{ pack.flavours.length }} Flavours
                </span>
            </div>
        </ng-template>

        <div class="overflow-x-auto overflow-y-auto max-h-[272px] mt-3">
            <table class="w-full form-table min-w-[1100px] border-collapse">
                <thead class="sticky top-0 bg-white z-10 p-2">
                    <tr>
                        <th class="table-header border border-t-0 w-2/5 text-left ps-5">Flavour</th>
                        <th class="table-header border border-t-0 w-1/5 text-center">Box</th>
                        <th class="table-header border border-t-0 w-1/5 text-center">Pouch</th>
                        <th class="table-header border border-t-0 w-1/5 text-center">Sticker</th>
                    </tr>
                </thead>

                <tbody>
                    @for (flavour of pack.flavours; track trackByFn($index, item)) {
                    <tr class="border-b">
                        <td class="py-2 px-2 border-r border-l w-2/5">
                            <span class="flex items-center">
                                <span class="ml-2">{{ flavour.name }}</span>
                            </span>
                        </td>

                         <td class="py-2 px-2 border-r w-1/5 text-right">
                            <div class="flex justify-end items-center gap-2">
                                <bft-button name="-" [disabled]="flavour.Box === 0"  (click)="decrement(flavour, 'Box')"></bft-button>
                                <bft-input-number [(ngModel)]="flavour.Box"></bft-input-number>
                                <bft-button name="+" (click)="increment(flavour, 'Box')"></bft-button>
                            </div>
                        </td>

                        <td class="py-2 px-2 border-r w-1/5 text-right">
                            <div class="flex justify-end items-center gap-2">
                                <bft-button name="-" [disabled]="flavour.Pouch === 0" (click)="decrement(flavour, 'Pouch')"></bft-button>
                                <bft-input-number [(ngModel)]="flavour.Pouch"></bft-input-number>
                                <bft-button name="+" (click)="increment(flavour, 'Pouch')"></bft-button>
                            </div>
                        </td>

                       

                        <td class="py-2 px-2 border-r w-1/5 text-right">
                            <div class="flex justify-end items-center gap-2">
                                <bft-button name="-" [disabled]="flavour.Sticker === 0" (click)="decrement(flavour, 'Sticker')"></bft-button>
                                <bft-input-number [(ngModel)]="flavour.Sticker"></bft-input-number>
                                <bft-button name="+" (click)="increment(flavour, 'Sticker')"></bft-button>
                            </div>
                        </td>
                    </tr>
                    }
                </tbody>

            </table>
        </div>
    </nz-collapse-panel>
    }
</nz-collapse>
