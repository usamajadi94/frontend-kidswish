<div class="grid grid-cols-2 gap-2">
    <div class="w-full">
      <bft-input-text name="Description" [required]="true" label="Name" [(ngModel)]="formData.Description"
        [skeleton]="isDataLoading" />
    </div>
    <div class="w-full">
      <bft-input-currency name="Price" [required]="true" label="Price" [(ngModel)]="formData.Price"
        [skeleton]="isDataLoading" symbol="$" />
    </div>
</div>
