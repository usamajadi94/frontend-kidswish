@if (primaryKey === 0) {

<!-- ── BULK ADD MODE ─────────────────────────────────────────── -->
<div class="flex flex-col gap-4">

    <!-- Only Date at top -->
    <div class="w-64">
        <bft-input-date name="Date" label="Date" [(ngModel)]="formData.Date" [required]="true" [skeleton]="isDataLoading" />
    </div>

    <!-- Lines table -->
    <div class="border rounded-lg overflow-hidden">
        <table class="w-full text-sm">
            <thead class="bg-gray-50 border-b">
                <tr>
                    <th class="text-left px-3 py-2 font-medium text-gray-600 w-36">Payment Type</th>
                    <th class="text-left px-3 py-2 font-medium text-gray-600 w-44">From (Bank Account)</th>
                    <th class="text-right px-3 py-2 font-medium text-gray-600 w-32">Amount (PKR)</th>
                    <th class="text-left px-3 py-2 font-medium text-gray-600 w-40">Vendor</th>
                    <th class="text-left px-3 py-2 font-medium text-gray-600">Notes</th>
                    <th class="w-8"></th>
                </tr>
            </thead>
            <tbody>
                @for (line of bulkLines; track $index; let i = $index) {
                <tr class="border-b last:border-0 hover:bg-gray-50">
                    <td class="px-2 py-1.5">
                        <select [(ngModel)]="line.PaymentType"
                            class="w-full border rounded px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400 bg-white">
                            <option [ngValue]="null">— Type —</option>
                            @for (pt of paymentTypes; track pt.ID) {
                                <option [ngValue]="pt.ID">{{ pt.Name }}</option>
                            }
                        </select>
                    </td>
                    <td class="px-2 py-1.5">
                        <select [(ngModel)]="line.FromPartyID"
                            class="w-full border rounded px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400 bg-white">
                            <option [ngValue]="null">— Account —</option>
                            @for (b of bankAccounts; track b.ID) {
                                <option [ngValue]="b.ID">{{ b.Name }}</option>
                            }
                        </select>
                    </td>
                    <td class="px-2 py-1.5">
                        <input type="number" [(ngModel)]="line.Amount" placeholder="0.00" min="0"
                            class="w-full border rounded px-2 py-1 text-sm text-right focus:outline-none focus:ring-1 focus:ring-blue-400" />
                    </td>
                    <td class="px-2 py-1.5">
                        <select [(ngModel)]="line.ToPartyID"
                            class="w-full border rounded px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400 bg-white">
                            <option [ngValue]="null">— Vendor —</option>
                            @for (v of vendors; track v.ID) {
                                <option [ngValue]="v.ID">{{ v.Name }}</option>
                            }
                        </select>
                    </td>
                    <td class="px-2 py-1.5">
                        <input type="text" [(ngModel)]="line.Notes" placeholder="Notes..."
                            class="w-full border rounded px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400" />
                    </td>
                    <td class="px-2 py-1.5 text-center">
                        @if (bulkLines.length > 1) {
                            <button type="button" (click)="removeLine(i)"
                                class="text-red-400 hover:text-red-600 font-bold text-lg leading-none">&times;</button>
                        }
                    </td>
                </tr>
                }
            </tbody>
            <tfoot class="bg-gray-50 border-t">
                <tr>
                    <td colspan="2" class="px-2 py-1.5">
                        <button type="button" (click)="addLine()"
                            class="text-blue-600 hover:text-blue-800 text-sm font-medium flex items-center gap-1">
                            <span class="text-base font-bold">+</span> Add Line
                        </button>
                    </td>
                    <td class="px-3 py-2 text-right font-semibold text-sm text-gray-800">
                        {{ bulkTotal | number:'1.2-2' }}
                    </td>
                    <td colspan="3"></td>
                </tr>
            </tfoot>
        </table>
    </div>

</div>

} @else {

<!-- ── VIEW / EDIT MODE (single entry) ─────────────────────────── -->
<div class="flex flex-col gap-4">

    <div class="grid grid-cols-2 gap-4">
        <bft-input-date name="Date" label="Date" [(ngModel)]="formData.Date" [required]="true" [skeleton]="isDataLoading" [disabled]="isView" />
        <bft-input-currency name="Amount" label="Amount" symbol="PKR" [(ngModel)]="formData.Amount" [skeleton]="isDataLoading" [disabled]="isView" />
    </div>

    <div class="flex items-end gap-4">
        <div class="w-48">
            <bft-select name="PaymentType" label="Payment Type" [displayList]="paymentTypes" valueField="ID" displayField="Name"
                [(ngModel)]="formData.PaymentType" [skeleton]="isDataLoading" [disabled]="isView" />
        </div>
        <div class="flex items-center gap-2 pb-2">
            <input type="checkbox" id="isDailyExpense" name="isDailyExpense" [(ngModel)]="isDailyExpense"
                class="w-4 h-4 rounded border-gray-300 text-blue-600 cursor-pointer" [disabled]="isView" />
            <label for="isDailyExpense" class="text-sm font-medium text-gray-700 cursor-pointer select-none whitespace-nowrap">
                Daily Expense
            </label>
        </div>
    </div>

    <bft-select name="FromPartyID" label="From (Bank Account)" [displayList]="bankAccounts" valueField="ID" displayField="Name"
        [(ngModel)]="formData.FromPartyID" [clearable]="true" [skeleton]="isDataLoading" [disabled]="isView" />

    <bft-select name="ToPartyID" [label]="isDailyExpense ? 'To (Vendor / Optional)' : 'To (Vendor)'"
        [displayList]="vendors" valueField="ID" displayField="Name"
        [(ngModel)]="formData.ToPartyID" [clearable]="true" [skeleton]="isDataLoading" [disabled]="isView" />

    @if (isDailyExpense) {
        <bft-select name="DailyExpensePettyCashID" label="Daily Expense Account *" [displayList]="pettyCashList" valueField="ID" displayField="Name"
            [(ngModel)]="dailyExpensePettyCashID" [clearable]="true" [skeleton]="isDataLoading" [disabled]="isView" />
        <bft-select name="DailyExpenseCategoryID" label="Expense Category *" [displayList]="expenseCategories" valueField="ID" displayField="Description"
            [(ngModel)]="dailyExpenseCategoryID" [clearable]="true" [skeleton]="isDataLoading" [disabled]="isView" />
    }

    <bft-textarea name="Notes" label="Notes" [(ngModel)]="formData.Notes" [skeleton]="isDataLoading" [disabled]="isView" />

</div>

}
