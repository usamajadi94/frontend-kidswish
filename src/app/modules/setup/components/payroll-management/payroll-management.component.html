<div class="">
  <div class="grid grid-cols-12 gap-4 items-end">
    <div class="col-span-4">
      <bft-input-date name="Date" label="Payroll Date" [(ngModel)]="formData.Date" />
    </div>
    <div class="col-span-4">  
      <bft-input-date name="PayrollMonth" label="Salary Month" [(ngModel)]="formData.PayrollMonth" format="MM/yyyy"  nzMode="month" />
    </div>
    
     <div class="col-span-4">
       <bft-select name="PayrollCycle" label="Payment Cycle" [(ngModel)]="formData.PayrollCycle" [displayList]="cycles"
         placeholder="Select cycle" (ngModelChange)="onPaymentCycleChange()" />
     </div>
  </div>

  <div class="flex justify-end  mt-2">
    <div>
      <nz-input-group nzPrefixIcon="search">
        <input nz-input placeholder="Search employee" [(ngModel)]="searchText" (ngModelChange)="onSearchChange()" />
      </nz-input-group>
    </div>
  </div>

  <div class="mt-2 border rounded-lg form-table">
    <div class="w-full">
      <div class="px-4">
        <div class="grid grid-cols-12 gap-1 py-2 font-semibold text-slate-600 border-b sticky top-0 bg-white z-10">
          <div class="col-span-1"><bft-checkbox name="selectAll" [(ngModel)]="selectAll" (ngModelChange)="toggleAll($event)" /></div>
          <div class="col-span-5 text-left">Employee Name</div>
          <div class="col-span-3 text-left">Salary</div>
          <div class="col-span-3 text-left">Process Salary</div>
        </div>

        <div class="overflow-y-auto max-h-[280px]">
          @for (emp of pagedEmployees; track emp) {
          <div class="grid grid-cols-12 gap-1 items-center py-1 border-b bg-slate-25 hover:bg-slate-50 transition-colors">
            <div class="col-span-1"><bft-checkbox [name]="'chk_'+emp.ID" [(ngModel)]="selectedMap[emp.ID]" /></div>
            <div class="col-span-5 text-left">
              <div class="font-medium text-[15px]">{{ emp.Description }}</div>
              <div class="text-xs text-slate-500">{{ emp.EmployeeId }}</div>
            </div>
            <div class="col-span-3 text-left font-medium">
              {{ emp.Salary | currency:'USD ' }}
            </div>
            <div class="col-span-3 text-left">
              <bft-input-currency [name]="'process_'+emp.ID" [(ngModel)]="emp.ProcessSalary" symbol="USD"
                [skeleton]="false" [required]="false" [disabled]="false" />
            </div>
          </div>
          }
        </div>

        <div class="flex items-center justify-end py-3">
          <nz-pagination [(nzPageIndex)]="pageIndex" [(nzPageSize)]="pageSize" [nzTotal]="filteredEmployees.length"></nz-pagination>
        </div>
      </div>
    </div>
  </div>

  <div class="flex items-center justify-end gap-3 mt-6">
    <div class="mr-auto text-slate-600 flex items-center gap-2">
      <mat-icon svgIcon="heroicons_solid:users" class="icon-size-5 text-[#3aafa9]"></mat-icon>
      <span class="text-lg font-medium">Selected Employees: <span class="font-bold text-slate-800">{{ selectedCount }}</span></span>
    </div>
    <bft-button name="Cancel" (onClick)="cancel()" />
  </div>
</div>
