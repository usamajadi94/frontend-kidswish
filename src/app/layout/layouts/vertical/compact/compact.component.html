<!-- Loading bar -->
<fuse-loading-bar></fuse-loading-bar>

<!-- Navigation -->
<fuse-vertical-navigation class="print:hidden side-nav" [appearance]="'compact'"
    [mode]="isScreenSmall ? 'over' : 'side'"
    [name]="'mainNavigation'"
    [navigation]="navigation.compact"
    [opened]="!isScreenSmall"
>
    <!-- Navigation header hook -->
    <ng-container fuseVerticalNavigationContentHeader>
        <!-- Logo -->
        <div class="mb-4 mt-3 flex h-20 items-center justify-center">
            <img style="width: 65px;" src="/images/logo/trackcloud/kidswishlogo.png" alt="Logo" />
        </div>
    </ng-container>
</fuse-vertical-navigation>

<!-- Wrapper -->
<div class="flex w-full min-w-0 flex-auto flex-col">
    <!-- Header -->
    <div
        class="bg-card relative z-49 flex h-16 w-full flex-0 items-center px-4 shadow dark:border-b dark:bg-transparent dark:shadow-none md:px-6 print:hidden"
    >
        <!-- Navigation toggle button -->
        <button mat-icon-button (click)="toggleNavigation('mainNavigation')">
            <mat-icon [svgIcon]="'heroicons_outline:bars-3'"></mat-icon>
        </button>
        <!-- Components -->
        <div class="ml-auto flex items-center space-x-0.5 pl-2 sm:space-x-2">
            <fuse-fullscreen class="hidden md:block"></fuse-fullscreen>
            <app-notifications-bell></app-notifications-bell>
            <button class="lg:hidden" mat-icon-button>
                <mat-icon [svgIcon]="'heroicons_outline:chat-bubble-left-right'"></mat-icon>
            </button>
            <user></user>
        </div>
    </div>

    <!-- Sub Navigation Bar -->
    @if (subNavItems.length > 0) {
    <div class="bg-white border-b flex items-center gap-1 px-4 overflow-x-auto print:hidden" style="min-height:42px;">
        @for (item of subNavItems; track item.id) {
        <a
            [routerLink]="item.link"
            class="flex items-center gap-1.5 px-3 py-2 text-sm rounded-md whitespace-nowrap transition-colors cursor-pointer no-underline"
            [class.text-primary]="isSubNavActive(item.link)"
            [class.bg-primary-50]="isSubNavActive(item.link)"
            [class.font-semibold]="isSubNavActive(item.link)"
            [class.text-gray-500]="!isSubNavActive(item.link)"
            [class.hover:bg-gray-100]="!isSubNavActive(item.link)"
        >
            @if (item.icon) {
            <mat-icon class="icon-size-4" [svgIcon]="item.icon"></mat-icon>
            }
            {{ item.title }}
        </a>
        }
    </div>
    }

    <!-- Content -->
    <div class="flex flex-auto flex-col layout-body">
        @if (true) {
        <router-outlet></router-outlet>
        }
    </div>
</div>
