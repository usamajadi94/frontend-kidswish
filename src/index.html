<!doctype html>
<html lang="en">
    <head>
        <title>Da Boss Leaf</title>
        <meta charset="utf-8" />
        <meta
            name="description"
            content="Admin Template and Starter Kit with Angular, Angular Material Components and TailwindCSS"
        />
        <meta
            name="keywords"
            content="Fuse,HTML,CSS,Angular,Angular 13,Angular 14,Angular 15,Material,Angular Components,Tailwind,Tailwind CSS,TailwindCSS,Admin Template,Admin Starter Kit"
        />
        <meta
            name="viewport"
            content="width=device-width, height=device-height, initial-scale=1.0, minimum-scale=1.0"
        />

        <base href="/" />

        <!-- Favicon (absolute path so browser caches, no re-fetch on navigation) -->
        <link rel="icon" type="image/png" href="/images/logo/trackcloud/icon.png" />

        <!-- Fonts -->
        <link href="fonts/inter/inter.css" rel="stylesheet" />
        <link href="https://fonts.gstatic.com" rel="preconnect" />

        <link
            href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap"
            rel="stylesheet"
        />

        <!-- Icon fonts -->
        <link
            href="https://fonts.googleapis.com/icon?family=Material+Icons"
            rel="stylesheet"
        />

        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
            rel="stylesheet">

        <!-- Splash screen styles -->
        <link href="styles/splash-screen.css" rel="stylesheet" />
        
        <!-- Google Translate -->
        <style>
            #google_translate_element { display: none; }
        </style>
        <script>
            function googleTranslateElementInit() {
                new google.translate.TranslateElement({
                    pageLanguage: 'en',
                    autoDisplay: false,
                    includedLanguages: 'en,es'
                }, 'google_translate_element');

                var browserLang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
                var langMap = {
                    'en': 'en',
                    'es': 'es'
                };
                var short = browserLang.split('-')[0];
                var target = langMap[browserLang] || langMap[short] || 'en';

                if (target !== 'en') {
                    var interval = setInterval(function () {
                        var select = document.querySelector('select.goog-te-combo');
                        if (select) {
                            select.value = target;
                            select.dispatchEvent(new Event('change'));
                            clearInterval(interval);
                        }
                    }, 500);
                    setTimeout(function(){ clearInterval(interval); }, 100);
                }
            }
        </script>
        <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    </head>

    <body>
        <!-- Splash screen -->
        <fuse-splash-screen>
            <img src="/images/logo/trackcloud/dabossicon.png" alt="" />
            <div class="spinner">
                <div class="bounce1"></div>
                <div class="bounce2"></div>
                <div class="bounce3"></div>
            </div>
        </fuse-splash-screen>

        <!-- App root -->
        <app-root></app-root>
        <div id="google_translate_element"></div>
    </body>
</html>
